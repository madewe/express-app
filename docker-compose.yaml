services:
  watchtower: 
    image: nickfedor/watchtower
    environment: 
      - WATCHTOWER_POLL_INTERVAL=60 
    #command: --run-once express-app
    command: express-app    
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock    
    container_name: watchtower

  express-app:
    image: madewe/express-app:latest
    ports:
      - 127.0.0.1:8080:8080
    container_name: express-app
